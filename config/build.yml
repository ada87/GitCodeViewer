name: mobile-and-web-checks

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:
  workflow_dispatch:

concurrency:
  group: gitcode-viewer-{{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 10.5.2
  NODE_VERSION: 22
  FIXTURE_DIR: D:/xdnote/GitCodeViewer

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: {{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: {{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run root typecheck
        run: pnpm --dir web exec tsc --noEmit
      - name: Build web assets
        run: pnpm -s web:build
      - name: Validate fixture count
        run: node scripts/check-fixtures.mjs

  sample-preview:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    strategy:
      fail-fast: false
      matrix:
        language:
          - markdown
          - json
          - xml
          - typescript
          - clojure
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: {{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Render preview fixture
        run: pnpm exec tsx scripts/render-preview.ts --language {{ matrix.language }}
      - name: Upload preview
        uses: actions/upload-artifact@v4
        with:
          name: preview-{{ matrix.language }}
          path: .artifacts/previews/{{ matrix.language }}.png

  mobile-assets:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: {{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build notebook, markdown and CodeMirror assets
        run: pnpm -s web:build
      - name: Archive android assets
        uses: actions/upload-artifact@v4
        with:
          name: android-assets
          path: android/app/src/main/assets

